version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alloyops_db
    environment:
      POSTGRES_USER: alloyops_user
      POSTGRES_PASSWORD: alloyops_password
      POSTGRES_DB: alloyops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alloyops_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
